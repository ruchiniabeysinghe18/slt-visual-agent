services:
  app:
    build: .
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      DB_HOST: mongodb
      GOOGLE_APPLICATION_CREDENTIALS: /app/sltaichallange-599b3b8646ad.json
    volumes:
      - ./chat_uploads:/app/chat_uploads
      - ./audio_tts:/app/audio_tts
      - ./avatar_videos:/app/avatar_videos
      - ./chroma_store:/app/chroma_store
      - ./uploaded_pdfs:/app/uploaded_pdfs
      - ./logs:/app/logs
      - ./sltaichallange-599b3b8646ad.json:/app/sltaichallange-599b3b8646ad.json:ro
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
